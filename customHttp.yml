# Amplify Hosting — SPA 라우팅 + PWA 캐시
# https://docs.aws.amazon.com/amplify/latest/userguide/custom-headers.html

customHeaders:
  - pattern: '**/index.html'
    headers:
      - key: Cache-Control
        value: no-cache, no-store, must-revalidate
  - pattern: '**/sw.js'
    headers:
      - key: Cache-Control
        value: no-cache, no-store, must-revalidate
  - pattern: '**/workbox-*.js'
    headers:
      - key: Cache-Control
        value: no-cache, no-store, must-revalidate
  - pattern: '**/manifest.webmanifest'
    headers:
      - key: Cache-Control
        value: max-age=0, must-revalidate
  - pattern: '/assets/**'
    headers:
      - key: Cache-Control
        value: public, max-age=31536000, immutable

redirects:
  # Vue Router history mode — /history, /settings 등 직접 접근 시 index.html
  - source: '/<*>'
    target: '/index.html'
    status: '404-200'
